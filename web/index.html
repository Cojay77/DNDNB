<!DOCTYPE html>
<html>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getMessaging } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA2hHdz8fse7fMJP8ygu05LtPUDbAqPKVQ",
    authDomain: "dispo-des-bros.firebaseapp.com",
    databaseURL: "https://dispo-des-bros-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dispo-des-bros",
    messagingSenderId: "604239799472",
    appId: "1:604239799472:web:c1eb4d25703e47f6c88775"
  };

  const app = initializeApp(firebaseConfig);

  navigator.serviceWorker.register("/firebase-messaging-sw.js").then((registration) => {
    console.log("✅ SW enregistré via JS avec scope :", registration.scope);
    const messaging = getMessaging(app, { serviceWorkerRegistration: registration });
    window.messaging = messaging;
  });
</script>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Dispo des Bros — Organise les sessions D&amp;D de ton groupe.">
  <meta name="theme-color" content="#1E1E1E">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dnd_availability_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>DDB</title>
  <link rel="manifest" href="manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        const event = new CustomEvent("newVersionAvailable");
        window.dispatchEvent(event);
      });
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #121212;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      user-select: none;
    }

    #splash-icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      box-shadow: 0 0 0 0 rgba(196, 84, 23, 0.6);
      animation: pulse-glow 2.4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%   { transform: scale(1);    box-shadow: 0 0 0 0   rgba(196, 84, 23, 0.55); }
      50%  { transform: scale(1.05); box-shadow: 0 0 28px 8px rgba(196, 84, 23, 0.20); }
      100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(196, 84, 23, 0.55); }
    }

    #splash-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #F5E6C8;
      text-transform: uppercase;
    }

    #splash-subtitle {
      font-size: 12px;
      letter-spacing: 3px;
      color: rgba(245, 230, 200, 0.4);
      text-transform: uppercase;
    }

    #splash-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C45417, transparent);
    }

    #splash-spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(196, 84, 23, 0.18);
      border-top-color: #C45417;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hidden error text — only shows if Flutter fails to boot */
    #loading-status {
      display: none;
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      max-width: 260px;
    }
  </style>

</head>


<body>

  <div id="splash">
    <img id="splash-icon" src="icons/Icon-192.png" alt="D&D&B" />
    <div id="splash-title">D&D&B</div>
    <div id="splash-divider"></div>
    <div id="splash-subtitle">Dispo des Bros</div>
    <div id="splash-spinner"></div>
    <div id="loading-status"></div>
  </div>

  <script>
    window.onerror = function (message) {
      const el = document.getElementById('loading-status');
      if (el) { el.style.display = 'block'; el.innerText = "Erreur : " + message; }
    };
  </script>

  <script>
    window.addEventListener('appinstalled', () => {
      console.log('📱 Application installée avec succès');
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      window.promptInstall = () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => {
            deferredPrompt = null;
          });
        }
      };
      console.log('✅ beforeinstallprompt capturé depuis JS');
    });

    window.isInStandaloneMode = () =>
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
  </script>

</body>

</html>
